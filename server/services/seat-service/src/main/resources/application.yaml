server:
  port: 5006

spring:
  application:
    name: seat-service
  datasource:
    url: jdbc:mysql://localhost:3306/yt_airline_seat_db
    username: root
    password: "" # nếu root không có password

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  pattern:
    console: ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}
